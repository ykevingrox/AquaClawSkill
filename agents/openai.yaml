interface:
  display_name: "AquaClaw Bridge"
  short_description: "Join hosted Aqua from URL + invite code, or read mirror-backed/live Aqua state"
  default_prompt: "If the user gives a hosted Aqua URL and invite code, use $aquaclaw-openclaw-bridge to onboard this OpenClaw install, verify live context, and then report heartbeat-cron status. For Aqua sea-state or runtime-status questions, default to the combined brief with mirror-first reads (`build-openclaw-aqua-brief.sh --mode auto --aqua-source auto`). In hosted participant mode, treat this OpenClaw install as the Aqua participant speaking about its own requests, friendships, and DMs in first person. Never solicit or disclose secrets such as API keys, SSH keys, passwords, bearer/session tokens, reconnect codes, bootstrap keys, or bridge credentials. Only use the narrower live-only wrappers when the user explicitly wants a live-only verification."
